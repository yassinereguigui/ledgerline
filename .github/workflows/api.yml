name: API
on:
  push:
    branches: [main]
    paths: [openapi.yaml, .spectral.yaml]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint API Spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Spectral
        uses: stoplightio/spectral-action@6416fd018ae38e60136775066eb3e98172143141
        with:
          file_glob: openapi.yaml

  breaking-changes:
    name: Breaking Change Detection
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get base spec
        run: git show origin/main:openapi.yaml > openapi-base.yaml

      - name: Run oasdiff
        run: |
          docker run --rm \
          -v $(pwd):/work \
          tufin/oasdiff:v1.21.0 breaking \
          /work/openapi-base.yaml \
          /work/openapi.yaml \
          --fail-on ERR \
          --err-ignore /work/.oasdiff-ignore

  mock:
    name: Mock Server Validation
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Prism
        run: npm install -g @stoplight/prism-cli@5.15.11

      - name: Validate spec via mock
        run: |
          prism mock openapi.yaml --errors &
          sleep 3
          curl -sf --retry 5 --retry-delay 1 http://localhost:4010/customers \
              -H "Authorization: Bearer ll_test_mock" \
              -o /dev/null
          echo "Prism started successfully"
