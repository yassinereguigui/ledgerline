name: API
on:
  push:
    branches: [main]
    paths: [openapi.yaml, .spectral.yaml]
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint API Spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Run Spectral
        run: npx spectral lint openapi.yaml --ruleset .spectral.yaml --format github-actions

  breaking-changes:
    name: Breaking Change Detection
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get base spec
        run: git show origin/main:openapi.yaml > openapi-base.yaml

      - name: Run oasdiff
        run: |
          docker run --rm \
          -v $(pwd):/work \
          tufin/oasdiff:v1.23.0 breaking \
          /work/openapi-base.yaml \
          /work/openapi.yaml \
          --fail-on ERR \
          --err-ignore /work/.oasdiff-ignore

      - name: Post API changelog comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGELOG=$(docker run --rm -v "$(pwd):/work" \
            tufin/oasdiff:v1.23.0 changelog \
            /work/openapi-base.yaml /work/openapi.yaml)
          [ -z "$CHANGELOG" ] && CHANGELOG="No API changes detected."
          {
            echo "## API changelog (vs \`main\`)"
            echo '```'
            echo "$CHANGELOG"
            echo '```'
          } > changelog.md
          gh pr comment "${{ github.event.pull_request.number }}" \
            --edit-last --create-if-none --body-file changelog.md

  mock:
    name: Mock Server Validation
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Validate spec via mock
        run: |
          npx prism mock openapi.yaml --errors &
          sleep 3
          curl -sf --retry 5 --retry-delay 1 http://localhost:4010/customers \
              -H "Authorization: Bearer ll_test_mock" \
              -o /dev/null
          echo "Prism started successfully"
