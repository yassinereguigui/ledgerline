extends:
  - "spectral:oas"
  - "@stoplight/spectral-owasp-ruleset"
rules:
  operation-tag-defined: true
  operation-summary:
    description: Every verb should have a summary
    given: $.paths[*][*]
    severity: error
    then:
      field: summary
      function: truthy
  operation-operationId-camel-case:
    description: opereationId must follow camelCase
    given: $.paths[*][*].operationId
    severity: error
    then:
      function: pattern
      functionOptions:
        match: "^[a-z][a-zA-Z0-9]*$"
  oas3-valid-schema-example: error
  oas3-valid-media-example: error
  "owasp:api8:2023-define-cors-origin": off
  "owasp:api4:2023-string-limit": warn
  "owasp:api4:2023-integer-limit": warn
  "owasp:api4:2023-integer-format": warn
  "owasp:api4:2023-array-limit": warn
  "owasp:api4:2023-rate-limit": warn
  "owasp:api9:2023-inventory-access": warn
