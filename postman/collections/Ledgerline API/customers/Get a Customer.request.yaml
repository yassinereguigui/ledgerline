$kind: http-request
name: Get a Customer
url: "{{baseUrl}}/customers/:customerId"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: customerId
    value: string
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: text
  content: ""
scripts:
  - type: afterResponse
    code: |-
      pm.test("200 OK", () => pm.response.to.have.status(200));
      pm.test("is a customer", () => pm.expect(pm.response.json().object).to.eql("customer"));
    language: text/javascript
examples: ./.resources/Get a Customer.resources/examples
order: 3000
