$kind: http-example
name: "No valid API key was provided. Include your key in the Authorization: Bearer ll_live_... header."
request:
  url: "{{baseUrl}}/customers/:customerId"
  method: GET
  headers:
    - key: Accept
      value: application/problem+json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  pathVariables:
    customerId: string
  body:
    type: text
    content: ""
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/problem+json
  body:
    type: json
    content: |-
      {
        "type": "https://api.ledgerline.com/problems/customer-not-found",
        "title": "Customer Not Found",
        "status": 404,
        "detail": "No customer with id cus_abc123 exists in this account.",
        "instance": "/v1/customers/cus_abc123"
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "type": {
            "type": "string",
            "example": "https://api.ledgerline.com/problems/customer-not-found",
            "format": "uri"
          },
          "title": {
            "type": "string",
            "example": "Customer Not Found"
          },
          "status": {
            "type": "integer",
            "example": 404
          },
          "detail": {
            "type": "string",
            "example": "No customer with id cus_abc123 exists in this account."
          },
          "instance": {
            "type": "string",
            "example": "/v1/customers/cus_abc123",
            "format": "uri-reference"
          }
        },
        "required": [
          "type",
          "title",
          "status"
        ]
      }
order: 2000
